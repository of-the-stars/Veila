name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libxkbcommon-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libxkbcommon-dev
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libxkbcommon-dev
      - run: cargo test --workspace

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: ./scripts/check-deps

  theme-previews:
    name: Theme Previews
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libxkbcommon-dev
      - run: cargo build -p veila-curtain
      - name: Render bundled theme previews
        run: |
          mkdir -p target/theme-previews
          for theme_path in assets/themes/*.toml; do
            theme_name="$(basename "$theme_path" .toml)"
            config_path="$RUNNER_TEMP/veila-theme-$theme_name.toml"
            preview_path="target/theme-previews/$theme_name.png"
            printf 'theme = "%s"\n' "$theme_name" > "$config_path"
            if grep -q '^mode = "file"' "$theme_path"; then
              printf '\n[background]\nmode = "solid"\n' >> "$config_path"
            fi
            ./target/debug/veila-curtain \
              --config "$config_path" \
              --preview-png "$preview_path" \
              --preview-size 1920x1080 \
              --preview-time 21:54 \
              --preview-username Michelle \
              --preview-hide-weather \
              --preview-hide-battery \
              --preview-hide-now-playing
            test -s "$preview_path"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: veila-theme-previews
          path: target/theme-previews/*.png

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libxkbcommon-dev
      - run: cargo build --release --workspace

  nix:
    name: Nix Package (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
            flake_check: true
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
            flake_check: false
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - if: matrix.flake_check
        run: nix flake check --print-build-logs
      - run: nix build .#packages.${{ matrix.system }}.default --print-build-logs
