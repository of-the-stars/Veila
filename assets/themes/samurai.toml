# Wallpaper source: https://wallhaven.cc/w/96wp7x
# Font: https://www.dafont.com/japanola.font?text=12%3A45
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#fafafa"
dim_strength = 20

[lock]
user_hint = "Password"
show_username = false

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "12h"
style = "standard"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Japanola"
font_weight = 700
color = "rgba(0, 0, 0, 0.7)"
size = 22
halign = "center"
valign = "center"
x = 0
y = -16

[visuals.date]
font_family = "Japanola"
font_weight = 700
color = "rgba(0, 0, 0, 0.7)"
size = 5
halign = "center"
valign = "center"
x = 0
y = 64

[visuals.input]
background_color = "rgba(0, 0, 0, 0)"
border_color = "rgba(0, 0, 0, 0.7)"
border_width = 3
width = 310
height = 54
radius = 50
mask_color = "#000000"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2

[visuals.status]
rejected_color = "#FF4D4D"
pending_color = "#000000"

[visuals.caps_lock]
color = "rgba(0, 0, 0, 0.6)"

[visuals.placeholder]
color = "rgba(0, 0, 0, 0.6)"

[visuals.eye]
color = "rgba(0, 0, 0, 0.8)"

[visuals.avatar]
enabled = false

[visuals.username]
enabled = false

[visuals.keyboard]
background_size = 46
background_color = "rgba(0, 0, 0, 0.7)"
color = "rgba(255, 255, 255, 0.9)"
size = 2
halign = "right"
valign = "top"
x = -24
y = 13

[visuals.battery]
background_color = "rgba(0, 0, 0, 0.7)"
background_size = 46
color = "rgba(255, 255, 255, 0.9)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 13

[visuals.weather]
enabled = true

[visuals.weather.icon]
size = 40
opacity = 100
halign = "left"
valign = "bottom"
x = 30
y = -112

[visuals.weather.temperature]
font_size = 6
font_family = "Geom"
font_weight = 600
letter_spacing = 0
color = "rgba(0, 0, 0, 0.73)"
halign = "left"
valign = "bottom"
x = 30
y = -66

[visuals.weather.location]
font_size = 3
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(0, 0, 0, 0.58)"
halign = "left"
valign = "bottom"
x = 30
y = -34


[visuals.now_playing]
enabled = false
fade_duration_ms = 320

[visuals.now_playing.artwork]
enabled = true
size = 44
radius = 8
opacity = 90
halign = "right"
valign = "bottom"
x = -384
y = -48

[visuals.now_playing.artist]
width = 318
color = "rgba(0, 0, 0, 0.59)"
font_family = "Google Sans Flex"
font_size = 2
font_weight = 400
halign = "right"
valign = "bottom"
x = -48
y = -80

[visuals.now_playing.title]
width = 318
color = "rgba(0, 0, 0, 0.69)"
font_family = "Google Sans Flex"
font_size = 2
font_weight = 400
halign = "right"
valign = "bottom"
x = -48
y = -48
