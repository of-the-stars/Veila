# Wallpaper source: https://unsplash.com/photos/landscape-photo-of-mountain-alps-vddccTqwal8
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#323449"
dim_strength = 64
blur_radius = 0
tint = "rgba(255, 255, 255, 0.1)"

[lock]
user_hint = "Password"
show_username = true

[visuals.layer]
enabled = true
mode = "solid"
style = "diagonal"
alignment = "right"
width = "full"
offset_x = 0
color = "#080A0E"
opacity = 42
blur_radius = 12

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
alignment = "top-left"
center_in_layer = true
format = "24h"
style = "standard"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Geom"
font_weight = 600
color = "#ffffff"
opacity = 40
size = 14
gap = 20

[visuals.date]
font_family = "Google Sans Flex"
font_weight = 400
color = "#C8D8F2"
opacity = 72

[visuals.input]
alignment = "bottom-center"
center_in_layer = true
background_color = "#FFFFFF"
background_opacity = 8
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2
border_color = "#FFFFFF"
border_width = 3
border_opacity = 8

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.placeholder]
color = "#ffffff"
opacity = 60

[visuals.avatar]
size = 160
gap = 24
background_color = "rgba(255, 255, 255, 0.04)"
placeholder_padding = 28
ring_color = "rgba(255, 255, 255, 0.15)"
ring_width = 3
icon_color = "#ffffff"

[visuals.username]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
size = 4
gap = 28

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.05)"
color = "#ffffff"
opacity = 68
size = 2
top_offset = -28
right_offset = 8

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
color = "#ffffff"
opacity = 68
size = 20
top_offset = -28
right_offset = 8
gap = 8

[visuals.weather]
size = 2
temperature_color = "#FFFFFF"
location_color = "#D6E3FF"
temperature_size = 6
location_size = 3
icon_size = 40
temperature_font_family = "Google Sans Flex"
temperature_font_weight = 400
temperature_letter_spacing = 0
location_font_family = "Google Sans Flex"
location_font_weight = 400
icon_gap = 6
location_gap = 1
opacity = 80
left_padding = 30
bottom_padding = 30
alignment = "left"

[visuals.now_playing]
enabled = false
content_gap = 18
fade_duration_ms = 320
title_color = "#ffffff"
artist_color = "#ffffff"
title_size = 2
artist_size = 2
artwork_size = 44
artwork_radius = 8
right_padding = 48
bottom_padding = 48
right_offset = 0
bottom_offset = 0
opacity = 72
title_opacity = 74
artist_opacity = 54
artwork_opacity = 90
title_font_family = "Google Sans Flex"
title_font_weight = 400
artist_font_family = "Google Sans Flex"
artist_font_weight = 400
width = 380
