# https://wallhaven.cc/w/48y7wy
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#403249"
dim_strength = 20

[lock]
user_hint = "Password"
show_username = true

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "24h"
style = "standard"
meridiem_font_size = 22
meridiem_x = 6
meridiem_y = 7
font_family = "Geom"
font_weight = 600
color = "rgba(255, 255, 255, 0.6)"
font_size = 88
halign = "center"
valign = "center"
x = 0
y = -30
relative_to = "auth_panel"

[visuals.date]
font_family = "Google Sans Flex"
font_weight = 400
font_size = 20
color = "rgba(255, 255, 255, 0.7)"
halign = "center"
valign = "center"
x = 0
y = 40
relative_to = "auth_panel"

[visuals.input]
background_color = "rgba(255, 255, 255, 0.1)"
border_color = "rgba(255, 255, 255, 0.08)"
border_width = 3
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 16
halign = "center"
valign = "bottom"
x = 0
y = -60
relative_to = "auth_panel"

[visuals.status]
mode = "inline"
rejected_color = "#FF8D8D"
pending_color = "#ECECEC"

[visuals.eye]
color = "rgba(255, 255, 255, 0.72)"

[visuals.caps_lock]
color = "rgba(255, 255, 255, 0.52)"

[visuals.placeholder]
color = "rgba(255, 255, 255, 0.9)"

[visuals.avatar]
# image_path = "/path/to/avatar.jpg"
size = 150
background_color = "rgba(255, 255, 255, 0.1)"
placeholder_padding = 28
ring_color = "rgba(255, 255, 255, 0.2)"
ring_width = 3
icon_color = "#ffffff"
halign = "center"
valign = "top"
x = 0
y = -75
relative_to = "auth_panel"

[visuals.username]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
font_size = 20
halign = "center"
valign = "top"
x = 0
y = 100
relative_to = "auth_panel"

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.05)"
color = "rgba(255, 255, 255, 0.68)"
size = 2
halign = "right"
valign = "top"
x = -24
y = 21

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
color = "rgba(255, 255, 255, 0.68)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 21

[visuals.weather.icon]
size = 40
opacity = 80
halign = "left"
valign = "bottom"
x = 40
y = -112

[visuals.weather.temperature]
font_size = 40
font_family = "Google Sans Flex"
font_weight = 400
letter_spacing = 0
color = "rgba(255, 255, 255, 0.73)"
halign = "left"
valign = "bottom"
x = 40
y = -70

[visuals.weather.location]
font_size = 22
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(214, 227, 255, 0.58)"
halign = "left"
valign = "bottom"
x = 40
y = -44

[visuals.now_playing]
enabled = false
fade_duration_ms = 320

[visuals.now_playing.artwork]
size = 44
radius = 8
opacity = 90
halign = "left"
valign = "center"
x = 10
y = 0
relative_to = "now_playing"

[visuals.now_playing.artist]
width = 318
color = "rgba(255, 255, 255, 0.39)"
font_family = "Google Sans Flex"
font_size = 16
font_weight = 400
halign = "left"
valign = "top"
x = 65
y = 10
relative_to = "now_playing"

[visuals.now_playing.title]
width = 318
color = "rgba(255, 255, 255, 0.69)"
font_family = "Google Sans Flex"
font_size = 16
font_weight = 400
halign = "left"
valign = "bottom"
x = 65
y = -10
relative_to = "now_playing"

# Now playing backdrop
[[visuals.backdrop]]
enabled = true
name = "now_playing"
show_when = "now_playing"
mode = "blur"
color = "rgba(255, 255, 255, 0.05)"
blur_strength = 12
radius = 10
border_color = "#FFFFFF18"
width = 400
height = 60
halign = "right"
valign = "bottom"
x = -40
y = -40
z = 1

# Auth stack Background
[[visuals.backdrop]]
enabled = true
name = "auth_panel"
mode = "blur"
color = "rgba(255, 255, 255, 0.05)"
blur_strength = 24
radius = 50
width = 540
height = 600
halign = "center"
valign = "center"
x = 0
y = 0
z = 0
