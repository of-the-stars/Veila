# Wallpaper: https://www.vecteezy.com/vector-art/39886274-sunset-beach-wallpaper-background-illustration
# Font: https://www.1001fonts.com/mail-ray-stuff-font.html
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#494732"
blur_radius = 0
dim_strength = 0

[lock]
user_hint = "Password"
show_username = false

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "24h"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Mail Ray Stuff"
font_weight = 400
color = "#ffffff"
opacity = 40
size = 24
gap = 20

[visuals.date]
font_family = "Mail Ray Stuff"
font_weight = 400
color = "#ffffff"
opacity = 40
size = 7

[visuals.input]
alignment = "bottom-center"
background_color = "#FFFFFF"
background_opacity = 2
border_color = "#FFFFFF"
border_width = 3
border_opacity = 8
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.placeholder]
color = "#ffffff"
opacity = 60

[visuals.avatar]
enabled = false
size = 192
gap = 24
background_color = "#FFFFFF0F"
placeholder_padding = 28
icon_color = "#ffffff"

[visuals.username]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
size = 4
gap = 28

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.05)"
color = "#ffffff"
opacity = 68
size = 2
top_offset = -24
right_offset = 8

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
color = "#ffffff"
opacity = 68
size = 20
top_offset = -24
right_offset = 8
gap = 8

[visuals.weather]
alignment = "left"
size = 2
temperature_color = "#FFFFFF"
location_color = "#D6E3FF"
temperature_size = 6
location_size = 3
icon_size = 40
temperature_font_family = "Nunito"
temperature_font_style = "italic"
temperature_font_weight = 800
temperature_letter_spacing = 0
location_font_family = "Google Sans Flex"
location_font_weight = 400
icon_gap = 6
location_gap = 1
opacity = 80
left_padding = 30
bottom_padding = 30

[visuals.now_playing]
enabled = false
content_gap = 18
fade_duration_ms = 320
title_color = "#ffffff"
artist_color = "#ffffff"
title_size = 2
artist_size = 2
artwork_size = 44
artwork_radius = 8
right_padding = 48
bottom_padding = 48
opacity = 72
title_opacity = 74
artist_opacity = 54
artwork_opacity = 90
title_font_family = "Google Sans Flex"
title_font_weight = 400
artist_font_family = "Google Sans Flex"
artist_font_weight = 400
width = 380
