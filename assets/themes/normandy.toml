# Background image source: https://wallhaven.cc/w/21dq26
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#324948"
blur_radius = 12
dim_strength = 34

[lock]
user_hint = "Password"
show_username = false

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
alignment = "center-center"
format = "24h"
style = "standard"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Google Sans Flex"
font_weight = 400
color = "#FFFFFF66"
size = 14
gap = 2

[visuals.date]
font_family = "Google Sans Flex"
font_weight = 400
color = "#C8D8F2"
opacity = 72

[visuals.input]
alignment = "center-center"
offset_y = 20
background_color = "#FFFFFF14"
border_color = "#FFFFFF14"
border_width = 3
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.placeholder]
color = "#FFFFFF99"

[visuals.avatar]
enabled = false

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.05)"
color = "#ffffff"
opacity = 68
size = 2
top_offset = -28
right_offset = 8

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
color = "#ffffff"
opacity = 68
size = 20
top_offset = -28
right_offset = 8
gap = 8

[visuals.weather]
size = 2
temperature_color = "#FFFFFF"
location_color = "#D6E3FF"
temperature_size = 6
location_size = 3
icon_size = 40
temperature_font_family = "Google Sans Flex"
temperature_font_weight = 400
temperature_letter_spacing = 0
location_font_family = "Google Sans Flex"
location_font_weight = 400
icon_gap = 6
location_gap = 1
opacity = 80
left_padding = 30
bottom_padding = 30
alignment = "left"

[visuals.now_playing]
enabled = false
content_gap = 18
fade_duration_ms = 320
title_color = "#ffffff"
artist_color = "#ffffff"
title_size = 2
artist_size = 2
artwork_size = 44
artwork_radius = 8
right_padding = 48
bottom_padding = 48
right_offset = 0
bottom_offset = 0
opacity = 72
title_opacity = 74
artist_opacity = 54
artwork_opacity = 90
title_font_family = "Google Sans Flex"
title_font_weight = 400
artist_font_family = "Google Sans Flex"
artist_font_weight = 400
width = 380
