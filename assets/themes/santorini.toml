# Wallpaper source: https://wallpaperaccess.com/santorini-4k
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#323C49"
dim_strength = 20

[lock]
user_hint = "Password"
show_username = true

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "24h"
style = "standard"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Geom"
font_weight = 600
color = "rgba(255, 255, 255, 0.72)"
size = 14
halign = "left"
valign = "top"
x = 40
y = 140

[visuals.date]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.72)"
halign = "left"
valign = "top"
x = 40
y = 256

[visuals.input]
background_color = "rgba(255, 255, 255, 0.08)"
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2
border_color = "rgba(255, 255, 255, 0.2)"
border_width = 3

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.eye]
color = "rgba(255, 255, 255, 0.72)"

[visuals.caps_lock]
color = "rgba(255, 255, 255, 0.52)"

[visuals.placeholder]
color = "rgba(255, 255, 255, 0.8)"

[visuals.avatar]
size = 192
background_color = "rgba(255, 255, 255, 0.08)"
placeholder_padding = 28
ring_color = "#ffffff"
ring_width = 3
icon_color = "#ffffff"

[visuals.username]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
size = 4

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.1)"
color = "rgba(255, 255, 255, 0.68)"
size = 2
halign = "right"
valign = "top"
x = -24
y = 13

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.1)"
background_size = 46
color = "rgba(255, 255, 255, 0.68)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 13

[visuals.weather]
enabled = true

[visuals.weather.icon]
size = 40
opacity = 80
halign = "left"
valign = "bottom"
x = 150
y = -232

[visuals.weather.temperature]
font_size = 6
font_family = "Google Sans Flex"
font_weight = 400
letter_spacing = 0
color = "rgba(255, 255, 255, 0.73)"
halign = "left"
valign = "bottom"
x = 150
y = -186

[visuals.weather.location]
font_size = 3
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(214, 227, 255, 0.58)"
halign = "left"
valign = "bottom"
x = 150
y = -154


[visuals.now_playing]
enabled = false
fade_duration_ms = 320

[visuals.now_playing.artwork]
enabled = true
size = 44
radius = 8
opacity = 90
halign = "right"
valign = "bottom"
