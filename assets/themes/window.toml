# Wallpaper source: https://wallhaven.cc/w/k81oj1
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#333249"
blur_radius = 0

[lock]
user_hint = "Password"
show_username = false

[visuals.layer]
enabled = true
style = "panel"
alignment = "right"
vertical_alignment = "center"
width = 540
height = 600
color = "#00000000"
blur_radius = 0
right_margin = 100

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "12h"
style = "standard"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Geom"
font_weight = 600
color = "#A6AECD66"
size = 20
halign = "center"
valign = "center"
x = 0
y = -30

[visuals.date]
font_family = "Google Sans Flex"
font_weight = 400
color = "#A6AECDB8"
size = 3
halign = "center"
valign = "center"
x = 0
y = 52

[visuals.input]
background_color = "#A6AECD0F"
border_color = "#FFFFFF0A"
border_width = 3
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 2

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.placeholder]
color = "#A6AECD99"

[visuals.avatar]
enabled = false

[visuals.username]
enabled = false

[visuals.keyboard]
background_size = 46
background_color = "rgba(166, 174, 205, 0.05)"
color = "rgba(255, 255, 255, 0.68)"
size = 2
halign = "right"
valign = "top"
x = -24
y = 13

[visuals.battery]
background_color = "rgba(166, 174, 205, 0.05)"
background_size = 46
color = "rgba(255, 255, 255, 0.68)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 13

[visuals.weather]
temperature_color = "#A6AECD74"
location_color = "#D6E3FF5C"
temperature_size = 6
location_size = 3
icon_size = 40
temperature_font_family = "Geom"
temperature_font_weight = 600
temperature_letter_spacing = 0
location_font_family = "Google Sans Flex"
location_font_weight = 400
icon_gap = 1
location_gap = 1
icon_opacity = 50
left_padding = 30
bottom_padding = 30
alignment = "left"

[visuals.now_playing]
enabled = false
content_gap = 18
fade_duration_ms = 320
title_color = "#A6AECDAF"
artist_color = "rgba(255, 255, 255, 0.61)"
title_size = 2
artist_size = 2
artwork_size = 44
artwork_radius = 8
right_padding = 48
bottom_padding = 48
right_offset = 0
bottom_offset = 0
artwork_opacity = 90
title_font_family = "Google Sans Flex"
title_font_weight = 400
artist_font_family = "Google Sans Flex"
artist_font_weight = 400
width = 380
