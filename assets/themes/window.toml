valign = "bottom"
x = 30
y = -112

[visuals.weather.temperature]
font_size = 6
font_family = "Geom"
font_weight = 600
letter_spacing = 0
color = "#A6AECD74"
halign = "left"
valign = "bottom"
x = 30
y = -66

[visuals.weather.location]
font_size = 3
